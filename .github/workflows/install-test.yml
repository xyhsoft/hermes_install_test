name: 安装测试

# Hermes 安装包多系统安装测试
# 在 Ubuntu / macOS / CentOS(Docker) / Windows 上跑 install → 验证 → 幂等二跑 → 卸载
# 根据失败日志继续修 hermes_install/scripts/ 下的脚本

on:
  push:
    branches: [main, master]
    paths:
      - 'hermes_install/**'
      - '.github/workflows/install-test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_uninstall:
        description: '是否跑卸载测试'
        type: boolean
        default: true

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI 旁路：跳过 Windows RunAs 提权、跳过交互
  HERMES_CI: "1"
  # 跳过所有交互/可选段（各 job 统一用这些参数）
  INSTALL_FLAGS: "--skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act"

jobs:
  # ============================================================
  # Linux / macOS / CentOS(Docker) 安装测试
  # ============================================================
  test-linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu-x64
            container: ""
          - os: macos-latest
            name: macOS
            container: ""
          - os: ubuntu-latest
            name: CentOS-7-Docker
            container: "centos:7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CentOS 容器准备（装 git/sudo/curl）
        if: matrix.container != ''
        run: |
          yum install -y epel-release
          yum install -y git sudo curl wget ca-certificates tar

      - name: 赋予脚本执行权限
        run: chmod +x hermes_install/scripts/*.sh

      - name: 安装（第一次）
        run: |
          set -x
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-1.log
          # 安装脚本退出码非 0 即失败（但脚本内部失败多为 warn 不退出，所以看产物）
        shell: bash

      - name: 验证安装产物
        run: |
          set -e
          echo "=== hermes --version ==="
          # 环境变量写的是 /etc/profile，新 shell 才生效；CI 里直接用绝对路径或 source
          source /etc/profile 2>/dev/null || true
          export PATH="/usr/local/hermes:/usr/local/hermes/lark:$PATH"
          export HERMES_HOME="${HERMES_HOME:-/var/lib/hermes}"
          hermes --version || { echo "❌ hermes 未装上"; exit 1; }
          echo "✅ hermes 已装上"

          echo "=== 飞书 CLI ==="
          test -x /usr/local/hermes/lark/lark && echo "✅ lark 存在" || { echo "⚠️ lark 未找到（可能在线下载失败，非致命）"; }

          echo "=== 依赖清单 ==="
          if [ -f "$HERMES_HOME/installed-deps.txt" ]; then
            echo "✅ 依赖清单已生成:"
            cat "$HERMES_HOME/installed-deps.txt"
          else
            echo "⚠️ 依赖清单未生成（升级模式或快照失败）"
          fi

          echo "=== CC-Switch 状态 ==="
          if command -v cc-switch >/dev/null 2>&1 || [ -x /opt/cc-switch/CC-Switch.AppImage ] || [ -d /Applications/CC-Switch.app ]; then
            echo "✅ CC-Switch 已安装"
          else
            echo "ℹ️ CC-Switch 未安装（预检跳过或下载失败，符合预期之一）"
          fi
        shell: bash

      - name: 幂等性测试（第二次安装应跳过）
        run: |
          set -e
          echo "=== 第二次安装 ==="
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-2.log
          # 幂等：第二次应出现"跳过"字样（hermes 已是目标版本）
          if grep -qE "跳过|已是.*版本|已装" install-2.log; then
            echo "✅ 幂等性生效（第二次出现跳过）"
          else
            echo "⚠️ 幂等性未检测到跳过字样（请人工核对 install-2.log）"
          fi
        shell: bash

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          set -e
          echo "=== 卸载 ==="
          # 卸载脚本有确认提示，用 y 管道喂入；依赖卸载也用 y
          printf 'y\ny\n' | sudo bash hermes_install/scripts/uninstall.sh --remove-config --remove-deps 2>&1 | tee uninstall.log
          echo "=== 验证卸载结果 ==="
          source /etc/profile 2>/dev/null || true
          if command -v hermes >/dev/null 2>&1; then
            # pip uninstall 后 hermes 可能仍在 PATH 缓存，二次确认
            if hermes --version >/dev/null 2>&1; then echo "❌ hermes 仍可用，卸载失败"; exit 1; fi
          fi
          echo "✅ hermes 已卸载"
          test -d /usr/local/hermes && echo "⚠️ 安装目录仍存在" || echo "✅ 安装目录已删除"
        shell: bash

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
            /var/log/hermes-install.log
          if-no-files-found: ignore

  # ============================================================
  # Windows 安装测试
  # ============================================================
  test-windows:
    name: Windows-x64
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HERMES_CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 放开执行策略
        run: Set-ExecutionPolicy Bypass -Scope Process -Force
        shell: pwsh

      - name: 安装（第一次）
        run: |
          $ErrorActionPreference = 'Continue'
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-1.log
        shell: pwsh

      - name: 验证安装产物
        run: |
          $ErrorActionPreference = 'Continue'
          # 刷新 PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== hermes --version ==="
          try { hermes --version; Write-Host "✅ hermes 已装上" } catch { Write-Host "❌ hermes 未装上"; exit 1 }
          Write-Host "=== config.yaml ==="
          if (Test-Path "$env:APPDATA\Hermes\config.yaml") { Write-Host "✅ config.yaml 存在" } else { Write-Host "⚠️ config.yaml 未生成（跳过了 provider 配置时正常）" }
          Write-Host "=== 依赖清单 ==="
          if (Test-Path "$env:APPDATA\Hermes\installed-deps.txt") { Write-Host "✅ 依赖清单:"; Get-Content "$env:APPDATA\Hermes\installed-deps.txt" } else { Write-Host "⚠️ 依赖清单未生成" }
          Write-Host "=== CC-Switch 状态 ==="
          $cc = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*CC-Switch*" }
          if ($cc) { Write-Host "✅ CC-Switch 已安装" } else { Write-Host "ℹ️ CC-Switch 未安装（下载失败或回滚，符合预期之一）" }
        shell: pwsh

      - name: 幂等性测试（第二次安装应跳过）
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== 第二次安装 ==="
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-2.log
          if (Select-String -Path install-2.log -Pattern "跳过|已是|已装" -Quiet) {
            Write-Host "✅ 幂等性生效"
          } else {
            Write-Host "⚠️ 幂等性未检测到跳过字样（请人工核对 install-2.log）"
          }
        shell: pwsh

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== 卸载 ==="
          # 卸载脚本有确认提示，用自动化输入
          'y' | & .\hermes_install\scripts\uninstall-windows.ps1 -REMOVE_CONFIG -REMOVE_DEPS -CI 2>&1 | Tee-Object -FilePath uninstall.log
          Write-Host "=== 验证卸载结果 ==="
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          try { hermes --version 2>$null; Write-Host "❌ hermes 仍可用，卸载失败"; exit 1 } catch { Write-Host "✅ hermes 已卸载" }
        shell: pwsh

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-Windows-x64
          path: |
            install-1.log
            install-2.log
            uninstall.log
            C:\Program Files\HermesAgent\install.log
          if-no-files-found: ignore
