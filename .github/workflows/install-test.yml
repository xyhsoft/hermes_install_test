name: 安装测试

# Hermes 安装包 Windows 安装测试（PowerShell 5.1 + 7 双版本）
# 跑 install → 验证 → 幂等二跑 → 卸载

on:
  push:
    branches: [main, master]
    paths:
      - 'hermes_install/**'
      - '.github/workflows/install-test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_uninstall:
        description: '是否跑卸载测试'
        type: boolean
        default: true

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

env:
  HERMES_CI: "1"

jobs:
  # ============================================================
  # Windows 安装测试（PowerShell 5.1 + PowerShell 7 双版本）
  # ============================================================
  test-windows:
    name: Windows-x64 (${{ matrix.shell-name }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell: pwsh
            shell-name: PS7
          - shell: powershell
            shell-name: PS5.1
    env:
      HERMES_CI: "1"
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 打印 PowerShell 版本
        run: $PSVersionTable.PSVersion

      - name: 放开执行策略
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: 安装（第一次）
        run: |
          $ErrorActionPreference = 'Continue'
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-1.log
          Write-Host "install-1 完成"

      - name: 验证安装产物
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== hermes --version ==="
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if (-not $hermesCmd) {
            foreach ($p in @("C:\Program Files\HermesAgent\hermes.exe","$env:APPDATA\Hermes\hermes.exe","$env:LOCALAPPDATA\Programs\Python\..\Scripts\hermes.exe","$env:USERPROFILE\.local\bin\hermes.exe")) {
              if (Test-Path $p) { $env:Path = "$env:Path;$(Split-Path $p)"; break }
            }
            $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          }
          if ($hermesCmd) {
            try { hermes --version; Write-Host "✅ hermes 已装上" }
            catch { Write-Host "❌ hermes --version 失败"; Get-Content install-1.log -Tail 50; exit 1 }
          } else {
            Write-Host "❌ hermes 未装上"
            Write-Host "--- pip show ---"
            pip show hermes-agent 2>&1
            Write-Host "--- install-1.log 末尾 ---"
            Get-Content install-1.log -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "=== 依赖清单 ==="
          if (Test-Path "$env:APPDATA\Hermes\installed-deps.txt") { Write-Host "✅ 依赖清单:"; Get-Content "$env:APPDATA\Hermes\installed-deps.txt" } else { Write-Host "⚠️ 依赖清单未生成" }
          Write-Host "=== CC-Switch 状态 ==="
          $cc = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*CC-Switch*" }
          if ($cc) { Write-Host "✅ CC-Switch 已安装" } else { Write-Host "ℹ️ CC-Switch 未安装（下载失败或回滚，符合预期之一）" }

      - name: 幂等性测试（第二次安装应跳过）
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-2.log
          if (Select-String -Path install-2.log -Pattern "跳过|已是|已装" -Quiet) {
            Write-Host "✅ 幂等性生效"
          } else {
            Write-Host "⚠️ 幂等性未检测到跳过字样（请人工核对 install-2.log）"
          }

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== 卸载 ==="
          & .\hermes_install\scripts\uninstall-windows.ps1 -REMOVE_CONFIG -REMOVE_DEPS -CI 2>&1 | Tee-Object -FilePath uninstall.log
          Write-Host "=== 验证卸载结果 ==="
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if ($hermesCmd) {
            try { hermes --version 2>$null; Write-Host "❌ hermes 仍可用，卸载失败"; exit 1 } catch {}
          }
          Write-Host "✅ hermes 已卸载"

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-Windows-${{ matrix.shell-name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore
