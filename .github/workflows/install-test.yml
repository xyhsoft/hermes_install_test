name: 安装测试

# Hermes 安装包多系统安装测试
# 在 Ubuntu / macOS / Windows 上跑 install → 验证 → 幂等二跑 → 卸载
# 根据失败日志继续修 hermes_install/scripts/ 下的脚本

on:
  push:
    branches: [main, master]
    paths:
      - 'hermes_install/**'
      - '.github/workflows/install-test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_uninstall:
        description: '是否跑卸载测试'
        type: boolean
        default: true

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

env:
  HERMES_CI: "1"
  INSTALL_FLAGS: "--skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act"

jobs:
  # ============================================================
  # Ubuntu / macOS 安装测试
  # ============================================================
  test-unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 已验证通过，暂停（如需恢复加回 ubuntu-latest 条目）
          - os: macos-latest
            name: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 赋予脚本执行权限
        run: chmod +x hermes_install/scripts/*.sh

      - name: 安装（第一次）
        # 容错：install.sh 内部失败多为 warn 不退出，但若 exit 1 也不让 step 挂，靠验证 step 抓
        run: |
          set -x
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-1.log
          echo "install-1 退出码: ${PIPESTATUS[0]}"
        shell: bash

      - name: 验证安装产物
        run: |
          set -e
          source /etc/profile 2>/dev/null || true
          source /etc/profile.d/hermes.sh 2>/dev/null || true
          export PATH="/usr/local/hermes:/usr/local/hermes/lark:/usr/local/bin:/usr/bin:/bin:/opt/homebrew/bin:$PATH"
          export HERMES_HOME="${HERMES_HOME:-/var/lib/hermes}"
          echo "=== hermes 定位 ==="
          # 优先读 install.sh 记录的 hermes 路径（macOS sudo 下 PATH 复杂，install.sh 已记录真实位置）
          HERMES_BIN=""
          if [ -f "$HERMES_HOME/.hermes-bin-path" ]; then
            HERMES_BIN=$(cat "$HERMES_HOME/.hermes-bin-path" 2>/dev/null)
            [ -x "$HERMES_BIN" ] || HERMES_BIN=""
          fi
          if [ -z "$HERMES_BIN" ]; then
            HERMES_BIN=$(command -v hermes 2>/dev/null || true)
          fi
          if [ -z "$HERMES_BIN" ]; then
            for p in /usr/local/bin/hermes /usr/bin/hermes /root/.local/bin/hermes "$HOME/.local/bin/hermes" \
                     /opt/homebrew/bin/hermes /opt/homebrew/opt/python@3.12/bin/hermes /opt/homebrew/opt/python@3.13/bin/hermes \
                     /usr/local/hermes/hermes \
                     /Library/Frameworks/Python.framework/Versions/3.12/bin/hermes /Library/Frameworks/Python.framework/Versions/3.13/bin/hermes \
                     /Library/Python/3.12/bin/hermes /Library/Python/3.9/bin/hermes; do
              [ -x "$p" ] && HERMES_BIN="$p" && break
            done
          fi
          echo "hermes 可执行: ${HERMES_BIN:-未找到}"
          if [ -z "$HERMES_BIN" ]; then
            echo "❌ hermes 未装上，开始诊断..."
            echo "--- .hermes-bin-path 文件内容（install.sh 记录的）---"
            sudo cat "$HERMES_HOME/.hermes-bin-path" 2>/dev/null || echo "(文件不存在，install_hermes 可能失败)"
            echo "--- which python3 / python3 --version ---"
            which python3; python3 --version
            echo "--- sudo python3 -m pip show hermes-agent ---"
            sudo python3 -m pip show hermes-agent 2>&1 || true
            echo "--- sudo python3 -m pip list | grep hermes ---"
            sudo python3 -m pip list 2>/dev/null | grep -i hermes || echo "(pip list 无 hermes)"
            echo "--- brew python 路径 ---"
            brew --prefix python3 2>/dev/null || echo "(无 brew)"
            ls /opt/homebrew/opt/python@3*/bin/hermes 2>/dev/null || echo "(brew python bin 无 hermes)"
            echo "--- install-1.log 中 Hermes Agent 安装段（处理 Hermes 到处理飞书）---"
            sed -n '/处理 Hermes Agent/,/处理飞书 CLI/p' install-1.log 2>/dev/null | head -60 || true
            echo "--- install-1.log 末尾 30 行 ---"
            tail -30 install-1.log 2>/dev/null || true
            exit 1
          fi
          "$HERMES_BIN" --version || { echo "❌ hermes --version 执行失败"; exit 1; }
          echo "✅ hermes 已装上"

          echo "=== 飞书 CLI ==="
          test -x /usr/local/hermes/lark/lark && echo "✅ lark 存在" || echo "⚠️ lark 未找到（非致命）"

          echo "=== 依赖清单 ==="
          if [ -f "$HERMES_HOME/installed-deps.txt" ]; then
            echo "✅ 依赖清单已生成:"; cat "$HERMES_HOME/installed-deps.txt"
          else
            echo "⚠️ 依赖清单未生成"
          fi

          echo "=== CC-Switch 状态 ==="
          if command -v cc-switch >/dev/null 2>&1 || [ -x /opt/cc-switch/CC-Switch.AppImage ] || [ -d /Applications/CC-Switch.app ]; then
            echo "✅ CC-Switch 已安装"
          else
            echo "ℹ️ CC-Switch 未安装（预检跳过或下载失败，符合预期之一）"
          fi
        shell: bash

      - name: 幂等性测试（第二次安装应跳过）
        run: |
          set -x
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-2.log
          if grep -qE "跳过|已是.*版本|已装" install-2.log; then
            echo "✅ 幂等性生效（第二次出现跳过）"
          else
            echo "⚠️ 幂等性未检测到跳过字样（请人工核对 install-2.log）"
          fi
        shell: bash

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          set -x
          printf 'y\n' | sudo bash hermes_install/scripts/uninstall.sh --remove-config --remove-deps 2>&1 | tee uninstall.log
          echo "=== 验证卸载结果 ==="
          source /etc/profile 2>/dev/null || true
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          if command -v hermes >/dev/null 2>&1 && hermes --version >/dev/null 2>&1; then
            echo "❌ hermes 仍可用，卸载失败"; exit 1
          fi
          echo "✅ hermes 已卸载"
          test -d /usr/local/hermes && echo "⚠️ 安装目录仍存在" || echo "✅ 安装目录已删除"
        shell: bash

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore

  # ============================================================
  # UOS V20 桌面版模拟测试（python:3.11-slim，debian bookworm 基础，不装 webkit2gtk）
  # 验证：apt 分支 + CC-Switch 预检跳过（webkit 不达标）+ Hermes/lark 装上 + 卸载干净
  # 注：UOS20 真机默认 python 3.7/3.9 装不了 hermes-agent（需 3.11+），CI 用 python:3.11
  #     镜像模拟"已装好 python 3.11"的场景；真机测试需用户先装 python 3.11+
  # 无头容器测不了 CC-Switch 真实运行和桌面自启动，那部分需真实 UOS 机器验证
  # ============================================================
  test-uos-sim:
    name: UOS20-sim(Python3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 构建 UOS20 模拟镜像（python:3.11-slim，不装 webkit2gtk 以验证 CC-Switch 预检跳过）
        run: |
          cat > Dockerfile.uos20 <<'EOF'
          FROM python:3.11-slim
          # python:3.11-slim 基于 debian bookworm，自带 python 3.11 + pip
          # 故意不装 libwebkit2gtk，模拟 UOS20 上 webkit 不达标的场景，验证 CC-Switch 预检跳过
          RUN apt-get update && \
              apt-get install -y --no-install-recommends \
                curl wget ca-certificates tar sudo && \
              apt-get clean && rm -rf /var/lib/apt/lists/*
          EOF
          docker build -t uos20-sim -f Dockerfile.uos20 .

      - name: 启动持久化容器（关键：所有 step 共享同一容器状态）
        run: |
          docker run -d --name hermes-test \
            -v "$PWD:/work" -w /work \
            uos20-sim sleep infinity
          docker exec hermes-test bash -c '
            echo "=== glibc 版本 ==="; ldd --version | head -1
            echo "=== webkit2gtk 检测（应为空）==="
            pkg-config --modversion webkit2gtk-4.1 2>/dev/null || echo "webkit2gtk-4.1: 无"
            pkg-config --modversion webkit2gtk-4.0 2>/dev/null || echo "webkit2gtk-4.0: 无"
            echo "=== python3 ==="; python3 --version
          '

      - name: 安装（第一次）
        run: |
          set -x
          docker exec hermes-test bash -c 'bash hermes_install/scripts/install.sh --skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act' 2>&1 | tee install-1.log
          echo "install-1 完成"

      - name: 验证安装产物 + CC-Switch 预检跳过
        run: |
          set -e
          echo "=== 在 UOS20 模拟容器内验证 ==="
          docker exec hermes-test bash -c '
            source /etc/profile 2>/dev/null || true
            export PATH="/usr/local/hermes:/usr/local/hermes/lark:/usr/local/bin:/usr/bin:/bin:$PATH"
            export HERMES_HOME="/var/lib/hermes"
            echo "--- hermes 定位 ---"
            HERMES_BIN=$(command -v hermes 2>/dev/null || true)
            for p in /usr/local/bin/hermes /usr/bin/hermes /root/.local/bin/hermes; do [ -x "$p" ] && HERMES_BIN="$p" && break; done
            echo "hermes 可执行: ${HERMES_BIN:-未找到}"
            if [ -z "$HERMES_BIN" ]; then
              echo "❌ hermes 未装上"
              python3 -m pip show hermes-agent 2>&1 || true
              exit 1
            fi
            "$HERMES_BIN" --version || { echo "❌ hermes --version 失败"; exit 1; }
            echo "✅ hermes 已装上"
            test -x /usr/local/hermes/lark/lark && echo "✅ lark 存在" || echo "⚠️ lark 未找到"
            echo "--- 依赖清单 ---"
            [ -f "$HERMES_HOME/installed-deps.txt" ] && { echo "✅ 依赖清单:"; cat "$HERMES_HOME/installed-deps.txt"; } || echo "⚠️ 依赖清单未生成"
            echo "--- CC-Switch 应未安装（预检跳过）---"
            if command -v cc-switch >/dev/null 2>&1 || [ -x /opt/cc-switch/CC-Switch.AppImage ]; then
              echo "❌ CC-Switch 不该装上却装了（预检未生效）"
              exit 1
            else
              echo "✅ CC-Switch 已正确跳过（预检生效）"
            fi
          '

      - name: 幂等性测试
        run: |
          set -x
          docker exec hermes-test bash -c 'bash hermes_install/scripts/install.sh --skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act' 2>&1 | tee install-2.log
          if grep -qE "跳过|已是.*版本|已装" install-2.log; then
            echo "✅ 幂等性生效"
          else
            echo "⚠️ 幂等性未检测到跳过字样"
          fi

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          set -x
          # 卸载脚本有确认提示，CI 模式下跳过（install.sh 已检测 HERMES_CI 但卸载脚本也需处理）
          printf 'y\n' | docker exec -i hermes-test bash -c 'bash hermes_install/scripts/uninstall.sh --remove-config --remove-deps' 2>&1 | tee uninstall.log
          echo "=== 验证卸载结果 ==="
          docker exec hermes-test bash -c '
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            if command -v hermes >/dev/null 2>&1 && hermes --version >/dev/null 2>&1; then
              echo "❌ hermes 仍可用，卸载失败"; exit 1
            fi
            echo "✅ hermes 已卸载"
            test -d /usr/local/hermes && echo "⚠️ 安装目录仍存在" || echo "✅ 安装目录已删除"
          '

      - name: 清理容器
        if: always()
        run: docker rm -f hermes-test 2>/dev/null || true

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-UOS20-sim
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore

  # ============================================================
  # Windows 安装测试
  # ============================================================
  test-windows:
    name: Windows-x64
    runs-on: windows-latest
    timeout-minutes: 30
    if: false  # Windows 已验证通过，暂停（如需恢复删除此行）
    env:
      HERMES_CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 放开执行策略
        run: Set-ExecutionPolicy Bypass -Scope Process -Force
        shell: pwsh

      - name: 安装（第一次）
        run: |
          $ErrorActionPreference = 'Continue'
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-1.log
          Write-Host "install-1 完成"
        shell: pwsh

      - name: 验证安装产物
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== hermes --version ==="
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if (-not $hermesCmd) {
            # 查常见路径
            foreach ($p in @("C:\Program Files\HermesAgent\hermes.exe","$env:APPDATA\Hermes\hermes.exe","$env:LOCALAPPDATA\Programs\Python\..\Scripts\hermes.exe","$env:USERPROFILE\.local\bin\hermes.exe")) {
              if (Test-Path $p) { $env:Path = "$env:Path;$(Split-Path $p)"; break }
            }
            $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          }
          if ($hermesCmd) {
            try { hermes --version; Write-Host "✅ hermes 已装上" }
            catch { Write-Host "❌ hermes --version 失败"; Get-Content install-1.log -Tail 50; exit 1 }
          } else {
            Write-Host "❌ hermes 未装上"
            Write-Host "--- pip show ---"
            pip show hermes-agent 2>&1
            Write-Host "--- install-1.log 末尾 ---"
            Get-Content install-1.log -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "=== 依赖清单 ==="
          if (Test-Path "$env:APPDATA\Hermes\installed-deps.txt") { Write-Host "✅ 依赖清单:"; Get-Content "$env:APPDATA\Hermes\installed-deps.txt" } else { Write-Host "⚠️ 依赖清单未生成" }
          Write-Host "=== CC-Switch 状态 ==="
          $cc = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*CC-Switch*" }
          if ($cc) { Write-Host "✅ CC-Switch 已安装" } else { Write-Host "ℹ️ CC-Switch 未安装（下载失败或回滚，符合预期之一）" }
        shell: pwsh

      - name: 幂等性测试（第二次安装应跳过）
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-2.log
          if (Select-String -Path install-2.log -Pattern "跳过|已是|已装" -Quiet) {
            Write-Host "✅ 幂等性生效"
          } else {
            Write-Host "⚠️ 幂等性未检测到跳过字样（请人工核对 install-2.log）"
          }
        shell: pwsh

      - name: 卸载测试
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== 卸载 ==="
          # -CI 模式自动跳过 Read-Host 确认（管道喂不进 Read-Host）
          & .\hermes_install\scripts\uninstall-windows.ps1 -REMOVE_CONFIG -REMOVE_DEPS -CI 2>&1 | Tee-Object -FilePath uninstall.log
          Write-Host "=== 验证卸载结果 ==="
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if ($hermesCmd) {
            try { hermes --version 2>$null; Write-Host "❌ hermes 仍可用，卸载失败"; exit 1 } catch {}
          }
          Write-Host "✅ hermes 已卸载"
        shell: pwsh

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-Windows-x64
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore
