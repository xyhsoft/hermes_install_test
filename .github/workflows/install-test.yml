name: 安装测试

# Hermes 安装包多系统安装测试
# Ubuntu / macOS / UOS20-sim / Windows(PowerShell 5.1 + 7 双版本)
# 跑 install → 验证 → 幂等二跑 → 卸载
# 注意：run: 内联代码必须用英文，GitHub 写临时脚本不加 BOM，
# PS5.1 用 GBK 读 UTF-8 中文会乱码导致解析失败。bash step 也用英文保持一致。

on:
  push:
    branches: [main, master]
    paths:
      - 'hermes_install/**'
      - '.github/workflows/install-test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_uninstall:
        description: '是否跑卸载测试'
        type: boolean
        default: true

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

env:
  HERMES_CI: "1"
  INSTALL_FLAGS: "--skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act"

jobs:
  # ============================================================
  # Ubuntu / macOS 安装测试
  # ============================================================
  test-unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu-x64
          - os: macos-latest
            name: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: chmod scripts
        run: chmod +x hermes_install/scripts/*.sh

      - name: Install (1st)
        run: |
          set -x
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-1.log
          echo "install-1 exit: ${PIPESTATUS[0]}"

      - name: Verify install
        run: |
          set -e
          source /etc/profile 2>/dev/null || true
          source /etc/profile.d/hermes.sh 2>/dev/null || true
          export PATH="/usr/local/hermes:/usr/local/hermes/lark:/usr/local/bin:/usr/bin:/bin:/opt/homebrew/bin:$PATH"
          export HERMES_HOME="${HERMES_HOME:-/var/lib/hermes}"
          echo "=== locate hermes ==="
          HERMES_BIN=""
          if [ -f "$HERMES_HOME/.hermes-bin-path" ]; then
            HERMES_BIN=$(cat "$HERMES_HOME/.hermes-bin-path" 2>/dev/null)
            [ -x "$HERMES_BIN" ] || HERMES_BIN=""
          fi
          if [ -z "$HERMES_BIN" ]; then
            HERMES_BIN=$(command -v hermes 2>/dev/null || true)
          fi
          if [ -z "$HERMES_BIN" ]; then
            for p in /usr/local/bin/hermes /usr/bin/hermes /root/.local/bin/hermes "$HOME/.local/bin/hermes" \
                     /opt/homebrew/bin/hermes /opt/homebrew/opt/python@3.12/bin/hermes /opt/homebrew/opt/python@3.13/bin/hermes \
                     /usr/local/hermes/hermes \
                     /Library/Frameworks/Python.framework/Versions/3.12/bin/hermes /Library/Frameworks/Python.framework/Versions/3.13/bin/hermes; do
              [ -x "$p" ] && HERMES_BIN="$p" && break
            done
          fi
          echo "hermes bin: ${HERMES_BIN:-not found}"
          if [ -z "$HERMES_BIN" ]; then
            echo "[FAIL] hermes not installed"
            echo "--- pip show ---"
            sudo python3 -m pip show hermes-agent 2>&1 || true
            echo "--- install-1.log tail ---"
            tail -50 install-1.log || true
            exit 1
          fi
          "$HERMES_BIN" --version || { echo "[FAIL] hermes --version failed"; exit 1; }
          echo "[OK] hermes installed"

          echo "=== lark ==="
          test -x /usr/local/hermes/lark/lark && echo "[OK] lark exists" || echo "[WARN] lark not found"

          echo "=== deps record ==="
          if [ -f "$HERMES_HOME/installed-deps.txt" ]; then
            echo "[OK] deps record:"; cat "$HERMES_HOME/installed-deps.txt"
          else
            echo "[WARN] no deps record"
          fi

          echo "=== CC-Switch status ==="
          if command -v cc-switch >/dev/null 2>&1 || [ -x /opt/cc-switch/CC-Switch.AppImage ] || [ -d /Applications/CC-Switch.app ]; then
            echo "[OK] CC-Switch installed"
          else
            echo "[INFO] CC-Switch not installed (expected if precheck skipped)"
          fi

      - name: Idempotency test (2nd install should skip)
        run: |
          set -x
          sudo bash hermes_install/scripts/install.sh $INSTALL_FLAGS 2>&1 | tee install-2.log
          if grep -qE "IDEMPOTENT_SKIP|skip|already|installed" install-2.log; then
            echo "[OK] idempotent"
          else
            echo "[WARN] no skip keyword in install-2.log"
          fi

      - name: Uninstall test
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          set -x
          printf 'y\n' | sudo bash hermes_install/scripts/uninstall.sh --remove-config --remove-deps 2>&1 | tee uninstall.log
          echo "=== verify uninstall ==="
          source /etc/profile 2>/dev/null || true
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          if command -v hermes >/dev/null 2>&1 && hermes --version >/dev/null 2>&1; then
            echo "[FAIL] hermes still available, uninstall failed"; exit 1
          fi
          echo "[OK] hermes uninstalled"
          test -d /usr/local/hermes && echo "[WARN] install dir still exists" || echo "[OK] install dir removed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore

  # ============================================================
  # UOS V20 模拟测试（python:3.11-slim 容器，不装 webkit2gtk 验证 CC-Switch 预检跳过）
  # ============================================================
  test-uos-sim:
    name: UOS20-sim(Python3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build UOS20 sim image
        run: |
          cat > Dockerfile.uos20 <<'EOF'
          FROM python:3.11-slim
          RUN apt-get update && \
              apt-get install -y --no-install-recommends curl wget ca-certificates tar sudo && \
              apt-get clean && rm -rf /var/lib/apt/lists/*
          EOF
          docker build -t uos20-sim -f Dockerfile.uos20 .

      - name: Start persistent container
        run: |
          docker run -d --name hermes-test -v "$PWD:/work" -w /work uos20-sim sleep infinity
          docker exec hermes-test bash -c '
            echo "=== glibc ==="; ldd --version | head -1
            echo "=== webkit (should be empty) ==="
            pkg-config --modversion webkit2gtk-4.1 2>/dev/null || echo "webkit2gtk-4.1: none"
            echo "=== python3 ==="; python3 --version
          '

      - name: Install (1st)
        run: |
          set -x
          docker exec hermes-test bash -c 'bash hermes_install/scripts/install.sh --skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act' 2>&1 | tee install-1.log
          echo "install-1 done"

      - name: Verify install + CC-Switch precheck skip
        run: |
          set -e
          docker exec hermes-test bash -c '
            source /etc/profile 2>/dev/null || true
            export PATH="/usr/local/hermes:/usr/local/hermes/lark:/usr/local/bin:/usr/bin:/bin:$PATH"
            export HERMES_HOME="/var/lib/hermes"
            echo "--- locate hermes ---"
            HERMES_BIN=$(command -v hermes 2>/dev/null || true)
            for p in /usr/local/bin/hermes /usr/bin/hermes /root/.local/bin/hermes; do [ -x "$p" ] && HERMES_BIN="$p" && break; done
            echo "hermes bin: ${HERMES_BIN:-not found}"
            if [ -z "$HERMES_BIN" ]; then
              echo "[FAIL] hermes not installed"
              python3 -m pip show hermes-agent 2>&1 || true
              exit 1
            fi
            "$HERMES_BIN" --version || { echo "[FAIL] hermes --version failed"; exit 1; }
            echo "[OK] hermes installed"
            test -x /usr/local/hermes/lark/lark && echo "[OK] lark exists" || echo "[WARN] lark not found"
            echo "--- deps record ---"
            [ -f "$HERMES_HOME/installed-deps.txt" ] && { echo "[OK] deps:"; cat "$HERMES_HOME/installed-deps.txt"; } || echo "[WARN] no deps record"
            echo "--- CC-Switch should NOT be installed (precheck skip) ---"
            if command -v cc-switch >/dev/null 2>&1 || [ -x /opt/cc-switch/CC-Switch.AppImage ]; then
              echo "[FAIL] CC-Switch installed but should be skipped"
              exit 1
            else
              echo "[OK] CC-Switch correctly skipped (precheck works)"
            fi
          '

      - name: Idempotency test
        run: |
          set -x
          docker exec hermes-test bash -c 'bash hermes_install/scripts/install.sh --skip-provider-config --skip-autostart --skip-connectivity-test --skip-browser-act' 2>&1 | tee install-2.log
          if grep -qE "IDEMPOTENT_SKIP|skip|already|installed" install-2.log; then
            echo "[OK] idempotent"
          else
            echo "[WARN] no skip keyword in install-2.log"
          fi

      - name: Uninstall test
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          set -x
          printf 'y\n' | docker exec -i hermes-test bash -c 'bash hermes_install/scripts/uninstall.sh --remove-config --remove-deps' 2>&1 | tee uninstall.log
          echo "=== verify uninstall ==="
          docker exec hermes-test bash -c '
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            if command -v hermes >/dev/null 2>&1 && hermes --version >/dev/null 2>&1; then
              echo "[FAIL] hermes still available, uninstall failed"; exit 1
            fi
            echo "[OK] hermes uninstalled"
            test -d /usr/local/hermes && echo "[WARN] install dir still exists" || echo "[OK] install dir removed"
          '

      - name: Cleanup container
        if: always()
        run: docker rm -f hermes-test 2>/dev/null || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-UOS20-sim
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore

  # ============================================================
  # Windows 安装测试（PowerShell 5.1 + 7 双版本）
  # ============================================================
  test-windows:
    name: Windows-x64 (${{ matrix.shell-name }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell: pwsh
            shell-name: PS7
          - shell: powershell
            shell-name: PS5.1
    env:
      HERMES_CI: "1"
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print PowerShell version
        run: $PSVersionTable.PSVersion

      - name: Set execution policy
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Install (1st)
        run: |
          $ErrorActionPreference = 'Continue'
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-1.log
          Write-Host "install-1 done"

      - name: Verify install
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== hermes --version ==="
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if (-not $hermesCmd) {
            foreach ($p in @("C:\Program Files\HermesAgent\hermes.exe","$env:APPDATA\Hermes\hermes.exe","$env:LOCALAPPDATA\Programs\Python\..\Scripts\hermes.exe","$env:USERPROFILE\.local\bin\hermes.exe")) {
              if (Test-Path $p) { $env:Path = "$env:Path;$(Split-Path $p)"; break }
            }
            $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          }
          if ($hermesCmd) {
            try { hermes --version; Write-Host "[OK] hermes installed" }
            catch { Write-Host "[FAIL] hermes --version failed"; Get-Content install-1.log -Tail 50; exit 1 }
          } else {
            Write-Host "[FAIL] hermes not installed"
            Write-Host "--- pip show ---"
            pip show hermes-agent 2>&1
            Write-Host "--- install-1.log tail ---"
            Get-Content install-1.log -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "=== deps record ==="
          if (Test-Path "$env:APPDATA\Hermes\installed-deps.txt") { Write-Host "[OK] deps:"; Get-Content "$env:APPDATA\Hermes\installed-deps.txt" } else { Write-Host "[WARN] no deps record" }
          Write-Host "=== CC-Switch status ==="
          $cc = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*CC-Switch*" }
          if ($cc) { Write-Host "[OK] CC-Switch installed" } else { Write-Host "[INFO] CC-Switch not installed (expected if download failed)" }

      - name: Idempotency test (2nd install should skip)
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-2.log
          if (Select-String -Path install-2.log -Pattern "IDEMPOTENT_SKIP|skip|already|installed" -Quiet) {
            Write-Host "[OK] idempotent"
          } else {
            Write-Host "[WARN] no skip keyword in install-2.log"
          }

      - name: Uninstall test
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== uninstall ==="
          & .\hermes_install\scripts\uninstall-windows.ps1 -REMOVE_CONFIG -REMOVE_DEPS -CI 2>&1 | Tee-Object -FilePath uninstall.log
          Write-Host "=== verify uninstall ==="
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if ($hermesCmd) {
            try { hermes --version 2>$null; Write-Host "[FAIL] hermes still available, uninstall failed"; exit 1 } catch {}
          }
          Write-Host "[OK] hermes uninstalled"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-Windows-${{ matrix.shell-name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore
