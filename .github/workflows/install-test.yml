name: 安装测试

# Hermes 安装包 Windows 安装测试（PowerShell 5.1 + 7 双版本）
# 跑 install → 验证 → 幂等二跑 → 卸载
# 注意：run: 内联 PowerShell 代码必须用英文，GitHub 写临时 ps1 不加 BOM，
# PS5.1 用 GBK 读 UTF-8 中文会乱码导致解析失败。

on:
  push:
    branches: [main, master]
    paths:
      - 'hermes_install/**'
      - '.github/workflows/install-test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_uninstall:
        description: '是否跑卸载测试'
        type: boolean
        default: true

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

env:
  HERMES_CI: "1"

jobs:
  test-windows:
    name: Windows-x64 (${{ matrix.shell-name }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell: pwsh
            shell-name: PS7
          - shell: powershell
            shell-name: PS5.1
    env:
      HERMES_CI: "1"
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print PowerShell version
        run: $PSVersionTable.PSVersion

      - name: Set execution policy
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Install (1st)
        run: |
          $ErrorActionPreference = 'Continue'
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-1.log
          Write-Host "install-1 done"

      - name: Verify install
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "=== hermes --version ==="
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if (-not $hermesCmd) {
            foreach ($p in @("C:\Program Files\HermesAgent\hermes.exe","$env:APPDATA\Hermes\hermes.exe","$env:LOCALAPPDATA\Programs\Python\..\Scripts\hermes.exe","$env:USERPROFILE\.local\bin\hermes.exe")) {
              if (Test-Path $p) { $env:Path = "$env:Path;$(Split-Path $p)"; break }
            }
            $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          }
          if ($hermesCmd) {
            try { hermes --version; Write-Host "[OK] hermes installed" }
            catch { Write-Host "[FAIL] hermes --version failed"; Get-Content install-1.log -Tail 50; exit 1 }
          } else {
            Write-Host "[FAIL] hermes not installed"
            Write-Host "--- pip show ---"
            pip show hermes-agent 2>&1
            Write-Host "--- install-1.log tail ---"
            Get-Content install-1.log -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "=== deps record ==="
          if (Test-Path "$env:APPDATA\Hermes\installed-deps.txt") { Write-Host "[OK] deps:"; Get-Content "$env:APPDATA\Hermes\installed-deps.txt" } else { Write-Host "[WARN] no deps record" }
          Write-Host "=== CC-Switch status ==="
          $cc = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*CC-Switch*" }
          if ($cc) { Write-Host "[OK] CC-Switch installed" } else { Write-Host "[INFO] CC-Switch not installed (expected if download failed)" }

      - name: Idempotency test (2nd install should skip)
        run: |
          $ErrorActionPreference = 'Continue'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          & .\hermes_install\scripts\install-windows.ps1 `
            -SKIP_PROVIDER_CONFIG -SKIP_AUTOSTART -SKIP_CONNECTIVITY_TEST -SKIP_BROWSER_ACT -CI `
            2>&1 | Tee-Object -FilePath install-2.log
          if (Select-String -Path install-2.log -Pattern "skip|already|installed" -Quiet) {
            Write-Host "[OK] idempotent"
          } else {
            Write-Host "[WARN] no skip keyword found in install-2.log"
          }

      - name: Uninstall test
        if: github.event.inputs.run_uninstall != 'false' && github.event_name != 'pull_request'
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== uninstall ==="
          & .\hermes_install\scripts\uninstall-windows.ps1 -REMOVE_CONFIG -REMOVE_DEPS -CI 2>&1 | Tee-Object -FilePath uninstall.log
          Write-Host "=== verify uninstall ==="
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $hermesCmd = Get-Command hermes -ErrorAction SilentlyContinue
          if ($hermesCmd) {
            try { hermes --version 2>$null; Write-Host "[FAIL] hermes still available, uninstall failed"; exit 1 } catch {}
          }
          Write-Host "[OK] hermes uninstalled"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-Windows-${{ matrix.shell-name }}
          path: |
            install-1.log
            install-2.log
            uninstall.log
          if-no-files-found: ignore
